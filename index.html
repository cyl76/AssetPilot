<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPilot - 質感大地色資產管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --bg-base: #F4F1EA;       /* 低飽和度米灰背景 */
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-main: #433830;     /* 深咖啡色文字 */
            --text-muted: #8A7F75;    /* 淺咖啡色備註 */
            --border-color: #E6E1D8;  /* 柔和邊框 */
            --accent-btn: #5C4F45;    /* 按鈕底色 */
            --accent-hover: #433830;  
            --profit-up: #C48282;     /* 低飽和紅(賺) */
            --profit-down: #7FA474;   /* 低飽和綠(賠) */
            --emoji-bg: #D4C6BF;      /* 指定的 Emoji 背景淡色 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
        }
        
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(67, 56, 48, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .clickable-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(67, 56, 48, 0.08);
            background: #ffffff;
            cursor: pointer;
        }

        .input-group {
            background-color: #FAF8F5;
            border: 1.5px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: border-color 0.2s;
        }
        
        .input-group:focus-within {
            border-color: var(--text-muted);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: var(--text-main);
            font-weight: 500;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: var(--accent-btn);
            color: white;
            padding: 0.85rem;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .modal-overlay {
            background: rgba(67, 56, 48, 0.3);
            backdrop-filter: blur(6px);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .list-modal-content {
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 由內部容器處理捲動 */
        }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 64px;
            height: 64px;
            background: var(--accent-btn);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(92, 79, 69, 0.3);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.2s, background 0.2s;
        }

        .fab:hover { 
            transform: scale(1.08); 
            background: var(--accent-hover);
        }

        /* 置頂表頭樣式 */
        .sticky-header th {
            font-size: 0.9rem !important;
            font-weight: 700 !important;
            padding: 1rem 0.75rem !important;
            text-align: center !important;
            background-color: #F8F6F2;
            color: var(--text-main);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 0 0 var(--border-color);
        }

        td {
            padding: 1.2rem 0.75rem;
        }

        .profit-pos { color: var(--profit-up); font-weight: bold; }
        .profit-neg { color: var(--profit-down); font-weight: bold; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .text-main { color: var(--text-main); }
        .text-muted { color: var(--text-muted); }
        .border-subtle { border-color: var(--border-color); }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-main tracking-tight">AssetPilot</h1>
                <p class="text-muted font-medium mt-1">資產配置管家</p>
            </div>
            <div class="glass-card clickable-card px-8 py-5 min-w-[260px] border-l-8" style="border-left-color: #8C7A6B;" onclick="openHistoryModal()" title="點擊查看/新增資產紀錄">
                <div class="flex justify-between items-center mb-1">
                    <div class="text-[11px] text-muted font-bold uppercase tracking-widest">預估總資產 (TWD)</div>
                    <svg class="w-4 h-4 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <div id="grand-total" class="text-4xl font-black font-mono text-main">$ 0</div>
            </div>
        </header>

        <!-- 圖表與 2x2 統計區 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10 items-stretch">
            <!-- 左側：圖表 -->
            <div class="lg:col-span-5 glass-card p-8 flex flex-col items-center justify-center relative min-h-[400px]">
                <h3 class="text-sm font-bold mb-6 text-muted uppercase tracking-widest">資產分布比例</h3>
                <div class="w-full h-[280px] relative">
                    <canvas id="assetChart"></canvas>
                    <div id="empty-chart-label" class="absolute inset-0 flex items-center justify-center text-muted font-bold pointer-events-none hidden text-lg">
                        尚未新增資產
                    </div>
                </div>
            </div>

            <!-- 右側：2x2 統計卡片 -->
            <div class="lg:col-span-7 grid grid-cols-2 gap-4" id="stats-grid">
                <!-- 由 JS 動態注入 4 個卡片 -->
            </div>
        </div>
    </div>

    <!-- 懸浮按鈕：新增 -->
    <div class="fab" onclick="openSelectorModal()" title="新增紀錄">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </div>

    <!-- 選擇種類 Modal -->
    <div id="selectorModal" class="modal-overlay" onclick="closeModal(event, 'selectorModal')">
        <div class="modal-content p-8">
            <h3 class="text-2xl font-bold mb-6 text-center text-main">請選擇資產種類</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="openEntryModal('twd')" class="p-6 border-2 border-subtle rounded-2xl hover:border-[#8C7A6B] hover:bg-[#FAF8F5] transition-all text-center">
                    <span class="text-3xl block mb-2">🏦</span><span class="font-bold text-main">台幣存款</span>
                </button>
                <button onclick="openEntryModal('fc')" class="p-6 border-2 border-subtle rounded-2xl hover:border-[#8C7A6B] hover:bg-[#FAF8F5] transition-all text-center">
                    <span class="text-3xl block mb-2">💵</span><span class="font-bold text-main">外幣資產</span>
                </button>
                <button onclick="openEntryModal('stock')" class="p-6 border-2 border-subtle rounded-2xl hover:border-[#8C7A6B] hover:bg-[#FAF8F5] transition-all text-center">
                    <span class="text-3xl block mb-2">📈</span><span class="font-bold text-main">證券投資</span>
                </button>
                <button onclick="openEntryModal('gold')" class="p-6 border-2 border-subtle rounded-2xl hover:border-[#8C7A6B] hover:bg-[#FAF8F5] transition-all text-center">
                    <span class="text-3xl block mb-2">✨</span><span class="font-bold text-main">黃金存摺</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 列表 Modal -->
    <div id="listModal" class="modal-overlay" onclick="closeModal(event, 'listModal')">
        <div class="modal-content list-modal-content p-0">
            <!-- 標題區：純淨白底 -->
            <div class="px-8 py-6 bg-white border-b border-subtle flex justify-between items-center z-20">
                <h3 id="listModalTitle" class="text-2xl font-bold text-main">資產列表</h3>
                <button onclick="document.getElementById('listModal').style.display='none'" class="text-muted hover:text-main transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- 列表區：置頂表頭並允許滾動 -->
            <div class="overflow-y-auto overflow-x-auto flex-1 no-scrollbar relative bg-white">
                <table class="w-full min-w-[700px] border-collapse">
                    <thead id="table-head" class="sticky-header"></thead>
                    <tbody id="list-body" class="divide-y divide-[#E6E1D8] text-center"></tbody>
                </table>
                <div id="empty-list-msg" class="py-24 text-center text-muted font-bold text-xl hidden">
                    目前尚無紀錄
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯/新增資料 Modal -->
    <div id="entryModal" class="modal-overlay" onclick="closeModal(event, 'entryModal')">
        <div class="modal-content p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="entryTitle" class="text-2xl font-bold text-main">新增紀錄</h3>
                <button onclick="document.getElementById('entryModal').style.display='none'" class="text-muted hover:text-main transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="assetForm" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="asset-type">
                <div id="form-fields" class="space-y-4"></div>
                <button type="button" onclick="handleSubmit()" class="btn-primary w-full py-4 mt-8 text-lg">確認送出</button>
            </form>
        </div>
    </div>

    <!-- 歷史紀錄 Modal -->
    <div id="historyModal" class="modal-overlay" onclick="closeModal(event, 'historyModal')">
        <div class="modal-content list-modal-content p-0" style="max-width: 800px;">
            <div class="px-8 py-6 bg-white border-b border-subtle flex justify-between items-center z-20">
                <div>
                    <h3 class="text-2xl font-bold text-main">總資產追蹤</h3>
                    <p class="text-sm text-muted mt-1">記錄並追蹤您的財富成長</p>
                </div>
                <button onclick="document.getElementById('historyModal').style.display='none'" class="text-muted hover:text-main transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 bg-[#FAF8F5]">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4">
                    <div class="text-lg font-bold text-main">當下總計: <span id="current-total-display" class="text-2xl font-mono text-main ml-2">$ 0</span></div>
                    <button onclick="saveHistoryRecord()" class="btn-primary py-2 px-6 text-sm flex items-center gap-2 whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                        記錄當下資產
                    </button>
                </div>
                <!-- 折線圖 -->
                <div class="w-full h-[250px] bg-white rounded-xl p-4 border border-subtle shadow-sm relative">
                    <canvas id="historyChart"></canvas>
                    <div id="empty-history-chart" class="absolute inset-0 flex items-center justify-center text-muted font-bold text-sm pointer-events-none hidden">
                        尚無歷史紀錄
                    </div>
                </div>
            </div>

            <!-- 歷史列表 -->
            <div class="overflow-y-auto flex-1 no-scrollbar bg-white">
                <table class="w-full border-collapse">
                    <thead class="sticky-header">
                        <tr><th>紀錄時間</th><th>總資產 (TWD)</th><th>相較前次增減</th><th>管理</th></tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-[#E6E1D8] text-center"></tbody>
                </table>
                <div id="empty-history-msg" class="py-12 text-center text-muted font-bold text-lg hidden">
                    目前尚無紀錄，點擊上方按鈕建立第一筆！
                </div>
            </div>
        </div>
    </div>

    <script>
        // 資料版本管理與初始化
        let assets = JSON.parse(localStorage.getItem('finance_v10_refined')) || [];
        let historyData = JSON.parse(localStorage.getItem('finance_history_v1')) || [];
        let chart = null;
        let histChart = null;

        const CONFIG = {
            twd: { title: "🏦 台幣存款", fields: [
                { id: 'date', label: '更新日期', type: 'date' },
                { id: 'name', label: '銀行', type: 'text', placeholder: '' },
                { id: 'value', label: '存款金額 (TWD)', type: 'number', placeholder: '0' },
                { id: 'note', label: '備註', type: 'text', placeholder: '' }
            ]},
            fc: { title: "💵 外幣資產", fields: [
                { id: 'date', label: '更新日期', type: 'date' },
                { id: 'bank', label: '持有銀行', type: 'text', placeholder: '' },
                { id: 'currency', label: '外幣幣別', type: 'text', placeholder: '' },
                { id: 'fVal', label: '外幣金額', type: 'number', placeholder: '0' },
                { id: 'rate', label: '當前匯率', type: 'number', step: '0.001', placeholder: '' },
                { id: 'cost', label: '購入成本 (TWD)', type: 'number', placeholder: '當初換匯成本' },
                { id: 'note', label: '備註', type: 'text' }
            ]},
            stock: { title: "📈 證券投資", fields: [
                { id: 'date', label: '更新日期', type: 'date' },
                { id: 'name', label: '證券戶', type: 'text' },
                { id: 'cat', label: '投資分類', type: 'text', placeholder: '' },
                { id: 'cost', label: '投入成本 (TWD)', type: 'number' },
                { id: 'value', label: '目前市值 (TWD)', type: 'number' },
                { id: 'note', label: '備註', type: 'text' }
            ]},
            gold: { title: "✨ 黃金存摺", fields: [
                { id: 'date', label: '紀錄日期', type: 'date' },
                { id: 'weight', label: '重量 (g)', type: 'number', step: '0.01' },
                { id: 'cost', label: '購入成本 (TWD)', type: 'number' },
                { id: 'note', label: '備註', type: 'text' }
            ]}
        };

        function openSelectorModal() {
            document.getElementById('selectorModal').style.display = 'flex';
        }

        function openEntryModal(type, editId = null) {
            document.getElementById('selectorModal').style.display = 'none';
            document.getElementById('entryModal').style.display = 'flex';
            document.getElementById('asset-type').value = type;
            document.getElementById('edit-id').value = editId || '';
            document.getElementById('entryTitle').innerText = (editId ? '編輯 ' : '新增 ') + CONFIG[type].title.substring(2);

            const formFields = document.getElementById('form-fields');
            formFields.innerHTML = CONFIG[type].fields.map(f => `
                <div>
                    <label>${f.label}</label>
                    <div class="input-group">
                        <input type="${f.type}" id="field-${f.id}" step="${f.step || '1'}" placeholder="${f.placeholder || ''}">
                    </div>
                </div>
            `).join('');

            if (editId) {
                const item = assets.find(a => a.id == editId);
                CONFIG[type].fields.forEach(f => {
                    document.getElementById(`field-${f.id}`).value = item[f.id] || '';
                });
            }
        }

        function openListModal(type) {
            const modal = document.getElementById('listModal');
            const head = document.getElementById('table-head');
            const body = document.getElementById('list-body');
            const emptyMsg = document.getElementById('empty-list-msg');
            const title = document.getElementById('listModalTitle');

            modal.style.display = 'flex';
            title.innerText = CONFIG[type].title.substring(2) + ' 列表';
            body.innerHTML = '';
            const filtered = assets.filter(a => a.type === type);

            if (filtered.length === 0) {
                emptyMsg.classList.remove('hidden');
                head.innerHTML = '';
            } else {
                emptyMsg.classList.add('hidden');
                
                if (type === 'twd') {
                    head.innerHTML = `<tr><th>日期</th><th>銀行</th><th>金額</th><th>備註</th><th>管理</th></tr>`;
                    filtered.forEach(a => {
                        body.innerHTML += `<tr>
                            <td class="font-mono text-muted text-xs">${a.date || '-'}</td>
                            <td class="font-bold text-main">${a.name}</td>
                            <td class="font-bold text-main text-lg">$ ${(a.value||0).toLocaleString()}</td>
                            <td class="text-muted text-sm">${a.note || '-'}</td>
                            <td>${actionBtns(a.id, 'twd')}</td>
                        </tr>`;
                    });
                } else if (type === 'fc') {
                    head.innerHTML = `<tr><th>日期</th><th>銀行(幣別)</th><th>市值(TWD)</th><th>損益</th><th>備註</th><th>管理</th></tr>`;
                    filtered.forEach(a => {
                        const market = a.fVal * a.rate;
                        const diff = market - a.cost;
                        body.innerHTML += `<tr>
                            <td class="font-mono text-muted text-xs">${a.date || '-'}</td>
                            <td class="font-bold text-main">${a.bank} <span class="text-xs text-muted font-normal ml-1">${a.currency}</span></td>
                            <td class="font-bold text-main text-lg">$ ${Math.round(market).toLocaleString()}</td>
                            <td class="${diff >= 0 ? 'profit-pos' : 'profit-neg'} text-sm">${diff >= 0 ? '+' : ''}${Math.round(diff).toLocaleString()}</td>
                            <td class="text-muted text-sm">${a.note || '-'}</td>
                            <td>${actionBtns(a.id, 'fc')}</td>
                        </tr>`;
                    });
                } else if (type === 'stock') {
                    head.innerHTML = `<tr><th>日期</th><th>標的</th><th>總成本</th><th>總市值</th><th>損益</th><th>管理</th></tr>`;
                    filtered.forEach(a => {
                        const diff = a.value - a.cost;
                        body.innerHTML += `<tr>
                            <td class="font-mono text-muted text-xs">${a.date || '-'}</td>
                            <td class="font-bold text-main">${a.name}</td>
                            <td class="text-muted text-sm">$ ${a.cost.toLocaleString()}</td>
                            <td class="font-bold text-main text-lg">$ ${a.value.toLocaleString()}</td>
                            <td class="${diff >= 0 ? 'profit-pos' : 'profit-neg'} text-sm">${diff >= 0 ? '+' : ''}${diff.toLocaleString()}</td>
                            <td>${actionBtns(a.id, 'stock')}</td>
                        </tr>`;
                    });
                } else if (type === 'gold') {
                    head.innerHTML = `<tr><th>日期</th><th>重量</th><th>購入成本</th><th>備註</th><th>管理</th></tr>`;
                    filtered.forEach(a => {
                        body.innerHTML += `<tr>
                            <td class="font-mono text-muted text-xs">${a.date || '-'}</td>
                            <td class="font-bold text-main text-lg">${a.weight} g</td>
                            <td class="font-bold text-main">$ ${a.cost.toLocaleString()}</td>
                            <td class="text-muted text-sm">${a.note || '-'}</td>
                            <td>${actionBtns(a.id, 'gold')}</td>
                        </tr>`;
                    });
                }
            }
        }

        function closeModal(e, id) {
            if (e.target.id === id) document.getElementById(id).style.display = 'none';
        }

        function handleSubmit() {
            const type = document.getElementById('asset-type').value;
            const editId = document.getElementById('edit-id').value;
            const newItem = { id: editId ? parseInt(editId) : Date.now(), type: type };

            CONFIG[type].fields.forEach(f => {
                const val = document.getElementById(`field-${f.id}`).value;
                newItem[f.id] = f.type === 'number' ? parseFloat(val) : val;
            });

            if (editId) assets = assets.filter(a => a.id != editId);
            assets.push(newItem);
            localStorage.setItem('finance_v10_refined', JSON.stringify(assets));
            document.getElementById('entryModal').style.display = 'none';
            
            const listModal = document.getElementById('listModal');
            if (listModal.style.display === 'flex') {
                openListModal(type);
            }
            render();
        }

        function deleteItem(id) {
            if(confirm('確定要刪除這筆紀錄嗎？')) {
                const type = assets.find(a => a.id == id).type;
                assets = assets.filter(a => a.id != id);
                localStorage.setItem('finance_v10_refined', JSON.stringify(assets));
                
                if (document.getElementById('listModal').style.display === 'flex') {
                    openListModal(type);
                }
                render();
            }
        }

        function render() {
            let tTWD = 0, tFC = 0, tStock = 0, gW = 0, gC = 0;
            assets.forEach(a => {
                if (a.type === 'twd') tTWD += a.value || 0;
                if (a.type === 'fc') tFC += (a.fVal * a.rate) || 0;
                if (a.type === 'stock') tStock += a.value || 0;
                if (a.type === 'gold') { gW += a.weight || 0; gC += a.cost || 0; }
            });

            const total = tTWD + tFC + tStock;
            document.getElementById('grand-total').innerText = `$ ${Math.round(total).toLocaleString()}`;

            updateStatsGrid(tTWD, tFC, tStock, gW, gC);
            updateChart(tTWD, tFC, tStock);
        }

        function updateStatsGrid(twd, fc, stock, gw, gc) {
            const grid = document.getElementById('stats-grid');
            // 低飽和度顏色定義
            const data = [
                { type: 'twd', label: '台幣儲蓄', val: `$ ${Math.round(twd).toLocaleString()}`, color: 'bg-[#EDCFCE]', icon: '🏦' },
                { type: 'fc', label: '外幣資產', val: `$ ${Math.round(fc).toLocaleString()}`, color: 'bg-[#D5ECCB]', icon: '💵' },
                { type: 'stock', label: '證券市值', val: `$ ${Math.round(stock).toLocaleString()}`, color: 'bg-[#D5E7F6]', icon: '📈' },
                { type: 'gold', label: '黃金紀錄', val: `${gw.toFixed(2)}g / $${gc.toLocaleString()}`, color: 'bg-[#F8EFD8]', icon: '✨' }
            ];

           grid.innerHTML = data.map(d => `
                <div onclick="openListModal('${d.type}')" class="glass-card clickable-card p-6 flex flex-col justify-between items-center text-center">
                    <div class="flex flex-col items-center">
                        <div class="w-10 h-10 ${d.color} text-white rounded-full flex items-center justify-center text-xl mb-3 shadow-inner">
                            ${d.icon}
                        </div>
                        <div class="text-[10px] font-bold text-muted uppercase tracking-widest mb-1">${d.label}</div>
                        <div class="text-xl font-black font-mono text-main">${d.val}</div>
                    </div>
                    <div class="mt-4 text-[10px] text-muted opacity-60 font-bold uppercase tracking-widest transition-opacity hover:opacity-100">點擊查看詳情</div>
                </div>
            `).join('');
        }

        function actionBtns(id, type) {
            return `<div class="flex justify-center gap-4">
                <button onclick="openEntryModal('${type}', ${id})" class="text-muted hover:text-main transition-colors" title="編輯">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </button>
                <button onclick="deleteItem(${id})" class="text-[#C5B3B3] hover:text-[#9A6262] transition-colors" title="刪除">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>`;
        }

        function updateChart(twd, fc, stock) {
            const ctx = document.getElementById('assetChart').getContext('2d');
            const labelEl = document.getElementById('empty-chart-label');
            if (chart) chart.destroy();
            
            const total = twd + fc + stock;
            const hasData = total > 0;
            
            labelEl.classList.toggle('hidden', hasData);

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['台幣', '外幣', '證券'],
                    datasets: [{
                        data: hasData ? [twd, fc, stock] : [1, 0, 0],
                        // 指定配色: 台幣#D8AEAB 外幣#B9D8AB 證券#B9D8AB
                        backgroundColor: hasData ? ['#EDCFCE', '#D5ECCB', '#D5E7F6'] : ['#E6E1D8'],
                        borderWidth: 0,
                        hoverOffset: hasData ? 15 : 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            display: hasData,
                            position: 'bottom', 
                            labels: { 
                                font: { size: 12, family: 'Noto Sans TC', weight: 'bold' },
                                color: '#433830',
                                padding: 25,
                                usePointStyle: true
                            } 
                        },
                        tooltip: { enabled: hasData }
                    },
                    cutout: '80%'
                }
            });
        }

        // --- 總資產歷史紀錄邏輯 ---
        
        function getCurrentTotal() {
            let tTWD = 0, tFC = 0, tStock = 0;
            assets.forEach(a => {
                if (a.type === 'twd') tTWD += a.value || 0;
                if (a.type === 'fc') tFC += (a.fVal * a.rate) || 0;
                if (a.type === 'stock') tStock += a.value || 0;
            });
            return tTWD + tFC + tStock;
        }

        function openHistoryModal() {
            document.getElementById('historyModal').style.display = 'flex';
            document.getElementById('current-total-display').innerText = `$ ${Math.round(getCurrentTotal()).toLocaleString()}`;
            renderHistory();
        }

        function saveHistoryRecord() {
            const currentTotal = Math.round(getCurrentTotal());
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-TW') + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            // 找出前一次紀錄計算差額
            let diff = 0;
            if (historyData.length > 0) {
                // 陣列最後一個是最新的一筆
                const lastRecord = historyData[historyData.length - 1];
                diff = currentTotal - lastRecord.amount;
            }

            const newRecord = {
                id: Date.now(),
                date: dateStr,
                timestamp: now.getTime(),
                amount: currentTotal,
                diff: diff
            };

            historyData.push(newRecord);
            // 依時間排序確保順序
            historyData.sort((a, b) => a.timestamp - b.timestamp);
            localStorage.setItem('finance_history_v1', JSON.stringify(historyData));
            
            renderHistory();
        }

        function deleteHistoryRecord(id) {
            if(confirm('確定要刪除這筆歷史紀錄嗎？')) {
                historyData = historyData.filter(h => h.id !== id);
                
                // 重新計算所有 diff
                for (let i = 0; i < historyData.length; i++) {
                    if (i === 0) {
                        historyData[i].diff = 0;
                    } else {
                        historyData[i].diff = historyData[i].amount - historyData[i-1].amount;
                    }
                }
                
                localStorage.setItem('finance_history_v1', JSON.stringify(historyData));
                renderHistory();
            }
        }

        function renderHistory() {
            const tbody = document.getElementById('history-body');
            const emptyMsg = document.getElementById('empty-history-msg');
            const chartEmpty = document.getElementById('empty-history-chart');
            
            if (historyData.length === 0) {
                tbody.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                chartEmpty.classList.remove('hidden');
                if (histChart) histChart.destroy();
                return;
            }
            
            emptyMsg.classList.add('hidden');
            chartEmpty.classList.add('hidden');
            
            // 列表 (反轉顯示，最新的在最上面)
            tbody.innerHTML = '';
            const reversedData = [...historyData].reverse();
            reversedData.forEach(h => {
                let diffHtml = '<span class="text-muted">-</span>';
                if (h.diff > 0) diffHtml = `<span class="profit-pos">+$ ${h.diff.toLocaleString()}</span>`;
                else if (h.diff < 0) diffHtml = `<span class="profit-neg">-$ ${Math.abs(h.diff).toLocaleString()}</span>`;
                
                tbody.innerHTML += `
                    <tr>
                        <td class="font-mono text-muted text-sm">${h.date}</td>
                        <td class="font-bold text-main text-lg">$ ${h.amount.toLocaleString()}</td>
                        <td class="font-bold">${diffHtml}</td>
                        <td>
                            <button onclick="deleteHistoryRecord(${h.id})" class="text-[#C5B3B3] hover:text-[#9A6262] transition-colors" title="刪除">
                                <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // 繪製折線圖
            updateHistoryChart();
        }

        function updateHistoryChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');
            if (histChart) histChart.destroy();

            const labels = historyData.map(h => h.date.split(' ')[0]); // 只取日期
            const dataPoints = historyData.map(h => h.amount);

            histChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '總資產趨勢',
                        data: dataPoints,
                        borderColor: '#8C7A6B',
                        backgroundColor: 'rgba(140, 122, 107, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#5C4F45',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '$ ' + context.parsed.y.toLocaleString();
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: false,
                            ticks: { font: { family: 'Noto Sans TC' } }
                        },
                        x: {
                            ticks: { font: { family: 'Noto Sans TC' } }
                        }
                    }
                }
            });
        }

        window.onload = render;
    </script>
</body>
</html>
